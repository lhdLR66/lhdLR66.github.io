// ====== 全国TOP5渲染 ======
(function(){
  var container = document.getElementById('ka50TopBars');
  if (!container || !ka50HqTop5) return;
  var colors = ['#4361ee','#7209b7','#f72585','#06d6a0','#ffd166'];

    var hPct = d.ffej / maxVal * 100;

      '<span style="font-size:11px;font-weight:600;color:var(--text);margin-bottom:4px;">'+d.ffej.toFixed(0)+'</span>' +
      '<div style="width:100%;height:'+hPct+'%;background:'+colors[i]+';border-radius:4px 4px 0 0;min-width:24px;transition:height 0.6s ease;"></div>' +
      '</div>';
  });
  container.innerHTML = html;
  var lbl = document.getElementById('ka50TopLabels');
  if (lbl) {
    lbl.innerHTML = ka50HqTop5.map(function(d){
      var s = d.hq.length > 8 ? d.hq.substring(0,8)+'…' : d.hq;
      return '<span style="text-align:center;flex:1;">'+s+'</span>';
    }).join('');
  }
  var pctEl = document.getElementById('ka50HqTop5Pct');
  if (pctEl) {
    var sumPct = ka50HqTop5.reduce(function(a,b){return a+b.share;},0);
    pctEl.textContent = sumPct.toFixed(0)+'%';
  }
  var tbl = document.getElementById('ka50HqTopTable');
  if (tbl) {
    var rows = '';
    ka50HqTop5.forEach(function(d,i){
      var rankClr = i<3 ? 'var(--primary)' : 'var(--text2)';
      var yoyStr = d.yoy!=null ? ((d.yoy>=0?'+':'')+d.yoy.toFixed(1)+'%') : '—';
      var yoyClr = d.yoy!=null ? (d.yoy>=0?'var(--success)':'var(--danger)') : 'var(--text2)';
      var momStr = d.mom!=null ? ((d.mom>=0?'+':'')+d.mom.toFixed(1)+'%') : '—';
      var momClr = d.mom!=null ? (d.mom>=0?'var(--danger)':'var(--success)') : 'var(--text2)';
      rows += '<tr><td style="color:'+rankClr+';font-weight:700;">'+(i+1)+'</td>'+
        '<td>'+d.hq+'</td>'+
        '<td class="num"><b>'+d.ffej.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,",")+'</b></td>'+
        '<td class="num">'+d.share+'%</td>'+
        '<td class="num" style="color:'+yoyClr+';font-weight:500;">'+yoyStr+'</td>'+
        '<td class="num" style="color:'+momClr+';font-weight:500;">'+momStr+'</td></tr>';
    });
    tbl.innerHTML = rows;
  }
})();

// ====== 各省KA50归属总部TOP5渲染 ======
(function(){
  var grid = document.getElementById('provTop5Grid');
  if (!grid || !ka50HqByProv) return;
  var provList = [];
  Object.keys(ka50HqByProv).forEach(function(p){
    provList.push({province:p, total:ka50HqByProv[p].total, top5:ka50HqByProv[p].top5});
  });
  provList.sort(function(a,b){return b.total - a.total;});
  var html = '';

    var provId = p.province.replace(/\s/g, '_');
    var totalHqs = p.top5.length;
    var top5Sum = p.top5.reduce(function(s,h){return s+h.ffej;},0);
    var top5Pct = p.total > 0 ? top5Sum/p.total*100 : 100;
    html += '<div class="table-card" style="border-radius:8px;overflow:hidden;">';
    html += '<div class="prov-top5-header" onclick="toggleCollapse(\'provTop5_'+provId+'\',\'provChev_'+provId+'\')">';
    html += '<span class="collapse-chevron" id="provChev_'+provId+'">▶</span>';
    html += '<span class="prov-name">'+p.province+'</span>';
    html += '<span class="prov-stats"><span>'+totalHqs+'总部</span><span>'+p.total.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,",")+'万</span><span>TOP5占'+top5Pct.toFixed(0)+'%</span></span>';
    html += '</div>';
    html += '<div id="provTop5_'+provId+'" class="collapse-body collapsed" style="padding:0;">';
    html += '<table style="width:100%;font-size:12px;margin:0;">';
    html += '<thead><tr><th style="width:30px;">#</th><th>归属总部</th><th class="num">纯销（万元）</th><th class="num">占本省</th><th class="num">同比</th><th class="num">环比</th></tr></thead><tbody>';
    p.top5.forEach(function(h,i){
      var rankClr = i<3 ? 'var(--primary)' : 'var(--text2)';
      var yoyStr = h.yoy!=null ? ((h.yoy>=0?'+':'')+h.yoy.toFixed(1)+'%') : '—';
      var yoyClr = h.yoy!=null ? (h.yoy>=0?'var(--success)':'var(--danger)') : 'var(--text2)';
      var momStr = h.mom!=null ? ((h.mom>=0?'+':'')+h.mom.toFixed(1)+'%') : '—';
      var momClr = h.mom!=null ? (h.mom>=0?'var(--danger)':'var(--success)') : 'var(--text2)';
      html += '<tr><td style="color:'+rankClr+';font-weight:700;text-align:center;">'+(i+1)+'</td>';
      html += '<td>'+h.hq+'</td>';
      html += '<td class="num"><b>'+h.ffej.toFixed(1).replace(/\B(?=(\d{3})+(?!\d))/g,",")+'</b></td>';
      html += '<td class="num">'+h.share+'%</td>';
      html += '<td class="num" style="color:'+yoyClr+';font-weight:500;">'+yoyStr+'</td>';
      html += '<td class="num" style="color:'+momClr+';font-weight:500;">'+momStr+'</td></tr>';
    });
    html += '</tbody></table></div></div>';
  });
  grid.innerHTML = html;
})();
</script>
