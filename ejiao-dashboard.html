<html lang="zh-CN">

        }
        .sidebar .logo {

            margin-bottom: 10px;

        .sidebar a {

        .sidebar a i {

            color: white;
            padding: 30px;
            text-align: center;

        .header p { font-size: 14px; opacity: 0.85; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .kpi-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }
        .kpi-card .label { font-size: 13px; color: #888; margin-bottom: 6px; }
        .kpi-card .value { font-size: 28px; font-weight: 700; }
        .kpi-card .sub { font-size: 13px; margin-top: 4px; }
        .kpi-card .icon {
            position: absolute; right: 16px; top: 16px;
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 18px;
        }
        .green .icon { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .blue .icon { background: linear-gradient(135deg, #0575e6, #021b79); }
        .orange .icon { background: linear-gradient(135deg, #f2994a, #f2c94c); }
        .red .icon { background: linear-gradient(135deg, #eb3349, #f45c43); }
        .up { color: #e74c3c; }.down { color: #27ae60; }.flat { color: #888; }

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        .full-width { grid-column: 1 / -1; }
        .chart-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .chart-box h3 {
            font-size: 15px;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-box h3 i { color: #667eea; }
        .chart-wrap { position: relative; height: 320px; }
        .chart-wrap.tall { height: 400px; }

        .combined-block {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            margin-bottom: 24px;
        }
        .combined-left {
            overflow: auto;
            max-height: 620px;
        }
        .combined-right {
            padding: 20px;
            border-left: 1px solid #e9ecef;
            overflow-y: auto;
            max-height: 620px;
        }
        .combined-right h3 {
            font-size: 14px;
            margin-bottom: 14px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .combined-right h3 i { color: #667eea; }
        .trend-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .trend-card {
            padding: 14px;
            border-radius: 8px;
        }
        .trend-card h4 {
            font-size: 13px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .trend-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .trend-card h4 {
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            font-weight: 500;

</head>

function fmt(v) { return v !== null && v !== undefined ? v.toFixed(2) : '--'; }
function pct(v) {
    if (v === null || v === undefined) return '--';
    return (v >= 0 ? '+' : '') + (v * 100).toFixed(1) + '%';
}
function badge(v) {
    if (v === null || v === undefined) return '<span class="badge-up flat">--</span>';
    if (v > 0) return '<span class="badge-up pos">&#9650; ' + pct(v) + '</span>';
    if (v < 0) return '<span class="badge-up neg">&#9660; ' + pct(v) + '</span>';
    return '<span class="badge-up flat">0.0%</span>';
}

        labels: sortedBy26.map(d => d.city),
        datasets: [
            { label: '26年1月', data: sortedBy26.map(d => d.chunxiao['2601']),
              backgroundColor: 'rgba(102, 126, 234, 0.6)', borderRadius: 3 },
            { label: '26年2月', data: sortedBy26.map(d => d.chunxiao['2602']),
              backgroundColor: 'rgba(118, 75, 162, 0.6)', borderRadius: 3 },
            { label: '26年3月', data: sortedBy26.map(d => d.chunxiao['2603']),
              backgroundColor: 'rgba(242, 153, 74, 0.6)', borderRadius: 3 }
        ]
    },
    options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top' } },
        scales: {
            y: { beginAtZero: true, title: { display: true, text: '百万元' } },
            x: { grid: { display: false } }
        }
    }
});

// ---- 同比趋势分析 ----
function monthlyYoy(d, metric, month) {
    const m = d[metric];
    const cur = m['26' + month];
    const prev = m['25' + month];
    if (prev && prev !== 0) return (cur / prev - 1);
    return null;
}

function classifyTrend(d, metric) {
    const y1 = monthlyYoy(d, metric, '01');
    const y2 = monthlyYoy(d, metric, '02');
    const y3 = monthlyYoy(d, metric, '03');
    if (y1 === null || y2 === null || y3 === null) return 'other';
    const s1 = y1 > 0, s2 = y2 > 0, s3 = y3 > 0;
    // V形反弹：1-2月同比↓→3月同比↑
    if (!s1 && !s2 && s3) return 'vshape';
    // 倒V冲高：1-2月同比↑→3月同比↓
    if (s1 && s2 && !s3) return 'peak';
    if (s1 && s2 && s3) return 'allrise';
    if (!s1 && !s2 && !s3) return 'allfall';
    const pos = (s1?1:0)+(s2?1:0)+(s3?1:0);
    return pos === 2 ? '2pos1neg' : '1pos2neg';
}

const trendNames = {
    vshape: { label: '1-2月下滑，3月增长', cls: 'vshape' },
    peak: { label: '1-2月增长，3月下滑', cls: 'inv-v' },
    allrise: { label: '三个月全部增长', cls: 'rise' },
    allfall: { label: '三个月全部下滑', cls: 'fall' },
    '2pos1neg': { label: '1月下滑，2-3月增长', cls: 'mix-pn' },
    '1pos2neg': { label: '1月、3月下滑，2月增长', cls: 'mix-np' }
};

function renderTrends(metric) {
    const groups = { allrise: [], allfall: [], vshape: [], peak: [], '2pos1neg': [], '1pos2neg': [] };
    DATA.forEach(d => {
        const t = classifyTrend(d, metric);
        if (groups[t]) groups[t].push(d.city);
    });
    document.getElementById('trendList').innerHTML =
        ['vshape','peak','allrise','allfall','2pos1neg','1pos2neg']
            .filter(k => groups[k].length > 0)
            .map(key => {
                const info = trendNames[key];
                const borderColor = key === 'allrise' ? '#e65100' : key === 'allfall' ? '#880e4f' : key === 'vshape' ? '#1b5e20' : key === 'peak' ? '#0d47a1' : key === '2pos1neg' ? '#c62828' : '#1565c0';
                const tagCls = key === '2pos1neg' ? 'mix-pn' : key === '1pos2neg' ? 'mix-np' : info.cls;
                return `<div class="trend-card" style="background:${borderColor}11">
                    <h4 style="color:${borderColor}">
                        ${info.label}
                        <span style="margin-left:auto;font-size:12px;font-weight:400;color:#888;">${groups[key].length}城</span>
                    </h4>
                    <div>${groups[key].map(c => `<span class="trend-tag ${tagCls}">${c}</span>`).join('')}</div>
                </div>`;
            }).join('');
}

// ---- 表格 ----
function renderTable(metric, trendFilter) {
    const cols = ['城市', '2601', '2601同比', '2602', '2602同比', '2603', '2603同比', '26Q1', 'Q1同比'];
    document.getElementById('tableHead').innerHTML = cols.map(c => `<th>${c}</th>`).join('');

    let filtered = [...DATA];
    if (trendFilter !== 'all') {
        filtered = filtered.filter(d => classifyTrend(d, metric) === trendFilter);
    }
    filtered.sort((a,b) => b[metric]['26Q1'] - a[metric]['26Q1']);

    document.getElementById('tableBody').innerHTML = filtered.map(d => {
        const m = d[metric];
        const y1 = monthlyYoy(d, metric, '01');
        const y2 = monthlyYoy(d, metric, '02');
        const y3 = monthlyYoy(d, metric, '03');
        return `<tr>
            <td>${d.city}</td>
            <td><strong>${fmt(m['2601'])}</strong></td><td>${badge(y1)}</td>
            <td><strong>${fmt(m['2602'])}</strong></td><td>${badge(y2)}</td>
            <td><strong>${fmt(m['2603'])}</strong></td><td>${badge(y3)}</td>
            <td><strong>${fmt(m['26Q1'])}</strong></td><td>${badge(m['yoy'])}</td>
        </tr>`;
    }).join('');
}

document.getElementById('metricFilter').addEventListener('change', function() {
    renderTable(this.value, 'all');
    renderTrends(this.value);
});

renderTrends('chunxiao');
renderTable('chunxiao', 'all');
</script>
