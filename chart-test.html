<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Chart Test</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"></script>
</head><body style="font-family:sans-serif;padding:20px;">
<h2>Chart.js Test</h2>
<div style="height:300px;width:700px;margin-bottom:20px;">
  <canvas id="c1"></canvas>
</div>
<div id="status"></div>
<script>
var s = document.getElementById('status');
s.innerHTML = 'Chart: ' + (typeof Chart !== 'undefined' ? 'LOADED' : 'NOT LOADED') + '<br>';
s.innerHTML += 'Canvas: ' + (document.getElementById('c1') ? 'FOUND' : 'NOT FOUND') + '<br>';

try {
  var ctx = document.getElementById('c1').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: { labels: ['A','B','C'], datasets: [{label:'Test',data:[10,20,30]}] },
    options: { responsive: true, maintainAspectRatio: false }
  });
  s.innerHTML += 'Chart created: OK';
} catch(e) {
  s.innerHTML += 'ERROR: ' + e.message;
}
</script>
</body></html>
