<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人工作看板 - 智能工作助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 简化版样式 - 完整版在单独文件中 */
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3a0ca3;
            --accent-color: #f72585;
            --success-color: #4cc9f0;
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-card: #ffffff;
            --bg-sidebar: #2b2d42;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --text-light: #ffffff;
            --border-color: #e9ecef;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --gradient-primary: linear-gradient(135deg, #4361ee, #3a0ca3);
            --border-radius: 16px;
            --transition: all 0.3s ease;
        }

        .dark-theme {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-card: #1e1e1e;
            --bg-sidebar: #0d1117;
            --text-primary: #e9ecef;
            --text-secondary: #adb5bd;
            --border-color: #2d3748;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; transition: var(--transition); }
        
        .theme-toggle { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .theme-btn { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50px; padding: 10px 20px; display: flex; align-items: center; gap: 8px; color: var(--text-primary); cursor: pointer; transition: var(--transition); box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); }
        .theme-btn:hover { transform: translateY(-2px); }
        
        .container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--bg-sidebar); color: var(--text-light); display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .main-content { flex: 1; margin-left: 280px; padding: 30px; background: var(--bg-secondary); min-height: 100vh; }
        
        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; gap: 15px; }
        .avatar-img { width: 60px; height: 60px; background: var(--gradient-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .user-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .user-role { font-size: 14px; opacity: 0.8; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 20px; background: var(--bg-card); border-radius: var(--border-radius); box-shadow: 0 4px 20px var(--shadow-color); }
        .search-box input { width: 100%; padding: 12px 20px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 50px; font-size: 14px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); border-radius: var(--border-radius); padding: 25px; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 20px var(--shadow-color); transition: var(--transition); position: relative; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--gradient-primary); }
        .stat-icon { width: 60px; height: 60px; border-radius: var(--border-radius); display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        .task-card .stat-icon { background: var(--gradient-primary); }
        .meeting-card .stat-icon { background: var(--gradient-accent); }
        .sales-card .stat-icon { background: linear-gradient(135deg, #4cc9f0, #4361ee); }
        .stat-value { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
        
        .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .card { background: var(--bg-card); border-radius: var(--border-radius); box-shadow: 0 4px 20px var(--shadow-color); overflow: hidden; transition: var(--transition); position: relative; cursor: pointer; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 40px var(--shadow-color); }
        .card-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .card-content { padding: 20px; }
        
        /* 销售数据卡片特殊样式 */
        .sales-data-card {
            background: linear-gradient(135deg, rgba(67, 97, 238, 0.1), rgba(58, 12, 163, 0.1));
            position: relative;
            overflow: hidden;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .sales-data-card::before {
            content: '💰';
            position: absolute;
            font-size: 120px;
            opacity: 0.1;
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .sales-data-content {
            position: relative;
            z-index: 1;
        }
        
        .sales-data-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .sales-data-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        
        .sales-data-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: #4361ee;
        }
        
        .chart-container { height: 200px; margin-bottom: 20px; }
        
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .main-content { margin-left: 80px; }
            .content-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="light-theme">
    <div class="theme-toggle">
        <button id="themeToggle" class="theme-btn">
            <i class="fas fa-moon"></i>
            <span>暗色模式</span>
        </button>
    </div>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="avatar-img">👨‍💼</div>
                <div>
                    <h3 class="user-name">工作达人</h3>
                    <p class="user-role">高级分析师</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <input type="text" placeholder="搜索任务、项目或同事...">
                </div>
                <div>2026年4月16日 星期三</div>
            </header>

            <div class="stats-grid">
                <div class="stat-card task-card">
                    <div class="stat-icon"><i class="fas fa-tasks"></i></div>
                    <div>
                        <h3>今日任务</h3>
                        <div class="stat-value">12/18</div>
                        <div>67% 完成</div>
                    </div>
                </div>
                <div class="stat-card meeting-card">
                    <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                    <div>
                        <h3>今日会议</h3>
                        <div class="stat-value">3</div>
                        <div>下一个: 10:30</div>
                    </div>
                </div>
                <div class="stat-card sales-card">
                    <div class="stat-icon"><i class="fas fa-chart-bar"></i></div>
                    <div>
                        <h3>本月销售额</h3>
                        <div class="stat-value">¥248,500</div>
                        <div>+12.5% vs 上月</div>
                    </div>
                </div>
            </div>

            <div class="content-grid">
                <!-- 销售数据卡片 - 简化版 -->
                <a href="https://lrwork.xyz/zhongkang-data.html" target="_blank" style="text-decoration: none; color: inherit; display: block;">
                    <section class="card sales-data-card">
                        <div class="sales-data-content">
                            <div class="sales-data-icon">
                                <i class="fas fa-coins"></i>
                            </div>
                            <div class="sales-data-title">销售数据</div>
                            <div class="sales-data-subtitle">点击查看补气补血TOP10产品数据</div>
                            <div style="font-size: 14px; color: var(--text-secondary);">
                                <i class="fas fa-arrow-right"></i> 中康数据看板
                            </div>
                        </div>
                    </section>
                </a>

                <!-- 会议安排卡片 -->
                <a href="https://my.feishu.cn/base/R2b9bDK7ka1D6Ts08c6cLW5Wnkf?table=tblfRx8rwu12LCHL&view=vewCa68PTI" target="_blank" style="text-decoration: none; color: inherit; display: block;">
                    <section class="card" style="background: linear-gradient(135deg, rgba(76, 201, 240, 0.1), rgba(67, 97, 238, 0.1)); position: relative; overflow: hidden; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                        <div style="position: relative; z-index: 1;">
                            <div style="font-size: 48px; margin-bottom: 15px; color: #4cc9f0;">
                                <i class="fas fa-calendar-alt"></i>
                            </div>
                            <div style="font-size: 28px; font-weight: 700; margin-bottom: 10px; background: linear-gradient(135deg, #4cc9f0, #4361ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">会议安排</div>
                            <div style="font-size: 16px; color: var(--text-secondary); margin-bottom: 20px;">点击查看会议安排看板</div>
                            <div style="font-size: 14px; color: var(--text-secondary);">
                                <i class="fas fa-external-link-alt"></i> 飞书云文档链接
                            </div>
                        </div>
                        <div style="position: absolute; font-size: 120px; opacity: 0.1; z-index: 0; top: 50%; left: 50%; transform: translate(-50%, -50%);">📅</div>
                    </section>
                </a>

                <section class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-project-diagram"></i> 项目管理</h3>
                    </div>
                    <div class="card-content">
                        <div>待办: 4 | 进行中: 3 | 已完成: 5</div>
                    </div>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-calendar-day"></i> 个人日报</h3>
                    </div>
                    <div class="card-content">
                        <div>今日任务: 4个 | 已完成: 2个</div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 主题切换
            const themeToggle = document.getElementById('themeToggle');
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-theme');
                document.body.classList.toggle('light-theme');
                const icon = this.querySelector('i');
                const text = this.querySelector('span');
                if (document.body.classList.contains('dark-theme')) {
                    icon.className = 'fas fa-sun';
                    text.textContent = '亮色模式';
                } else {
                    icon.className = 'fas fa-moon';
                    text.textContent = '暗色模式';
                }
            });

            console.log('个人工作看板已加载！');
        });
    </script>
</body>
</html>
