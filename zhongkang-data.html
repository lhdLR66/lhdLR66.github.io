<script>
// 行情数据 - 需要用户提供实际数据
const marketCategories = ["滋补保健类", "补气补血", "补气类", "补血类", "气血双补"];
const marketColors = ["#4361ee", "#f72585", "#4cc9f0", "#7209b7", "#f8961e"];

// 季度标签 20Q1-25Q4
const marketQuarters = [];
for (let year = 20; year <= 25; year++) {
    for (let quarter = 1; quarter <= 4; quarter++) {
        marketQuarters.push(`${year}Q${quarter}`);
    }
}

// 模拟数据 - 需要替换为实际数据
const marketSalesData = {
    "滋补保健类": Array(24).fill(0).map(() => Math.random() * 1000 + 500),
    "补气补血": Array(24).fill(0).map(() => Math.random() * 800 + 400),
    "补气类": Array(24).fill(0).map(() => Math.random() * 600 + 300),
    "补血类": Array(24).fill(0).map(() => Math.random() * 700 + 350),
    "气血双补": Array(24).fill(0).map(() => Math.random() * 400 + 200)
};

const marketYoYData = {
    "滋补保健类": Array(24).fill(0).map(() => (Math.random() * 40 - 10)),
    "补气补血": Array(24).fill(0).map(() => (Math.random() * 50 - 15)),
    "补气类": Array(24).fill(0).map(() => (Math.random() * 45 - 12)),
    "补血类": Array(24).fill(0).map(() => (Math.random() * 55 - 18)),
    "气血双补": Array(24).fill(0).map(() => (Math.random() * 35 - 8))
};

// 初始化行情图表
function initMarketCharts() {
    // 销售额图表
    const salesCtx = document.getElementById('marketSalesChart').getContext('2d');
    new Chart(salesCtx, {
        type: 'line',
        data: {
            labels: marketQuarters,
            datasets: marketCategories.map((category, index) => ({
                label: category,
                data: marketSalesData[category],
                borderColor: marketColors[index],
                backgroundColor: marketColors[index] + '20',
                borderWidth: 2,
                fill: true,
                tension: 0.3
            }))
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: false,
                    title: {
                        display: true,
                        text: '销售额（百万元）'
                    }
                }
            }
        }
    });

    // 同比变化图表
    const yoyCtx = document.getElementById('marketYoYChart').getContext('2d');
    new Chart(yoyCtx, {
        type: 'line',
        data: {
            labels: marketQuarters,
            datasets: marketCategories.map((category, index) => ({
                label: category,
                data: marketYoYData[category],
                borderColor: marketColors[index],
                backgroundColor: 'transparent',
                borderWidth: 2,
                tension: 0.3
            }))
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    title: {
                        display: true,
                        text: '同比变化（%）'
                    }
                }
            }
        }
    });
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
    initMarketCharts();
});
</script>

        // 初始化产品筛选器
        function initProductFilter() {
            const container = document.getElementById('productFilterContainer');
            if (!container) return;
            
            // 清空容器，只保留标题
            const titleDiv = container.querySelector('div');
            container.innerHTML = '';
            if (titleDiv) container.appendChild(titleDiv);
            
            // 为每个产品创建复选框
            productData.products.forEach((product, index) => {
                const checkboxId = `product-checkbox-${index}`;
                
                const label = document.createElement('label');
                label.htmlFor = checkboxId;
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = checkboxId;
                checkbox.checked = true;
                checkbox.dataset.productId = product.id;
                checkbox.addEventListener('change', updateCharts);
                
                const span = document.createElement('span');
                span.textContent = product.name;
                
                label.appendChild(checkbox);
                label.appendChild(span);
                container.appendChild(label);
            });
            
            console.log('产品筛选器初始化完成，共' + productData.products.length + '个产品');
        }
        
        // 获取选中的产品ID
        function getSelectedProductIds() {
            const checkboxes = document.querySelectorAll('#productFilterContainer input[type="checkbox"]');
            return Array.from(checkboxes)
                .filter(cb => cb.checked)
                .map(cb => cb.dataset.productId);
        }
        
        let salesChart = null;
        let yoyChart = null;
        
        // 初始化销售额图表
        function initSalesChart() {
            const ctx = document.getElementById('salesChart').getContext('2d');
            salesChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: productData.quarters,
                    datasets: []
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                font: { size: 12 },
                                boxWidth: 12,
                                padding: 15
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + context.parsed.y.toFixed(1) + '百万';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: { size: 11 },
                                maxTicksLimit: 20,
                                callback: function(value, index, ticks) {
                                    // 每4个季度显示一次标签，避免过于拥挤
                                    if (index % 4 === 0 || index === ticks.length - 1) {
                                        return this.getLabelForValue(value);
                                    }
                                    return '';
                                }
                            }
                        },
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return value.toLocaleString('zh-CN') + '百万';
                                },
                                font: { size: 11 }
                            },
                            title: {
                                display: true,
                                text: '销售额（百万元）',
                                font: { size: 12 }
                            }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    }
                }
            });
        }
        
        // 初始化同比变化图表
        function initYoyChart() {
            const ctx = document.getElementById('yoyChart').getContext('2d');
            yoyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: productData.quarters,
                    datasets: []
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                font: { size: 12 },
                                boxWidth: 12,
                                padding: 15
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + context.parsed.y.toFixed(1) + '%';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: { size: 11 },
                                maxTicksLimit: 20,
                                callback: function(value, index, ticks) {
                                    if (index % 4 === 0 || index === ticks.length - 1) {
                                        return this.getLabelForValue(value);
                                    }
                                    return '';
                                }
                            }
                        },
                        y: {
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                },
                                font: { size: 11 }
                            },
                            title: {
                                display: true,
                                text: '同比变化（%）',
                                font: { size: 12 }
                            }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    }
                }
            });
        }
        
        // 更新图表
        function updateCharts() {
            const selectedIds = getSelectedProductIds();
            const selectedProducts = productData.products.filter(p => selectedIds.includes(p.id));
            
            console.log('更新图表，选中' + selectedProducts.length + '个产品');
            
            // 颜色方案
            const colors = [
                '#4361ee', '#3a0ca3', '#f72585', '#4cc9f0', '#7209b7',
                '#f8961e', '#4ade80', '#f59e0b', '#10b981', '#8b5cf6'
            ];
            
            // 更新销售额图表
            if (salesChart) {
                salesChart.data.datasets = selectedProducts.map((product, index) => ({
                    label: product.name,
                    data: product.sales,
                    backgroundColor: colors[index % colors.length] + '80', // 80表示50%透明度
                    borderColor: colors[index % colors.length],
                    borderWidth: 1,
                    borderRadius: 3
                }));
                salesChart.update();
            }
            
            // 更新同比变化图表
            if (yoyChart) {
                yoyChart.data.datasets = selectedProducts.map((product, index) => ({
                    label: product.name,
                    data: product.yoy_changes,
                    borderColor: colors[index % colors.length],
                    backgroundColor: colors[index % colors.length] + '20', // 20表示12.5%透明度
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 3,
                    pointHoverRadius: 5
                }));
                yoyChart.update();
            }
            
            updateDataTable(selectedProducts);
        }
        
        // 更新数据表格
        function updateDataTable(products) {
            const table = document.getElementById('dataTable');
            if (!table) return;
            
            const thead = table.querySelector('thead');
            const tbody = table.querySelector('tbody');
            
            // 更新表头
            let headerRow = thead.querySelector('tr');
            if (!headerRow) {
                headerRow = document.createElement('tr');
                thead.appendChild(headerRow);
            }
            
            // 清空表头（保留第一列"产品"）
            while (headerRow.children.length > 1) {
                headerRow.removeChild(headerRow.lastChild);
            }
            
            // 添加季度列
            productData.quarters.forEach(q => {
                const th = document.createElement('th');
                th.textContent = q;
                th.style.textAlign = 'center';
                headerRow.appendChild(th);
            });
            
            // 更新表格内容
            tbody.innerHTML = '';
            products.forEach(product => {
                const row = document.createElement('tr');
                
                // 产品名称列
                const nameCell = document.createElement('td');
                nameCell.textContent = product.name;
                nameCell.style.fontWeight = '500';
                row.appendChild(nameCell);
                
                // 季度数据列
                product.sales.forEach(sale => {
                    const cell = document.createElement('td');
                    cell.textContent = sale.toFixed(1);
                    cell.style.textAlign = 'right';
                    row.appendChild(cell);
                });
                
                tbody.appendChild(row);
            });
            
            console.log('数据表格更新完成');
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM加载完成，开始初始化...');
            
            // 初始化筛选器
            initProductFilter();
            
            // 初始化图表
            initSalesChart();
            initYoyChart();
            
            // 初始更新图表（显示所有产品）
            updateCharts();
            
            console.log('页面初始化完成');
        });
    </script>
</body>
</html>
