        // 初始化区域切换
        function initRegionTabs() {
            console.log('初始化区域切换...');
            
            const regionTabs = document.getElementById('regionTabs');
            const displaySpan = document.getElementById('currentRegionDisplay');
            
            if (!regionTabs) {
                console.error('regionTabs元素未找到');
                return;
            }

            // 清空现有按钮
            regionTabs.innerHTML = '';

            // 添加全国按钮
            const nationalBtn = document.createElement('button');
            nationalBtn.className = 'region-tab active';
            nationalBtn.dataset.region = '全国';
            nationalBtn.innerHTML = '<i class="fas fa-globe"></i> 全国';
            nationalBtn.onclick = () => handleRegionClick('全国');
            regionTabs.appendChild(nationalBtn);

            // 添加直辖市按钮
            municipalities.forEach(city => {
                const btn = document.createElement('button');
                btn.className = 'region-tab';
                btn.dataset.region = city;
                btn.textContent = city;
                btn.onclick = () => handleRegionClick(city);
                regionTabs.appendChild(btn);
            });

            // 添加省份按钮
            Object.keys(cityData).forEach(province => {
                const btn = document.createElement('button');
                btn.className = 'region-tab';
                btn.dataset.region = province;
                btn.textContent = province;
                btn.onclick = () => handleRegionClick(province);
                regionTabs.appendChild(btn);
            });

            console.log('区域按钮初始化完成');
        }

        // 处理区域点击
        function handleRegionClick(region) {
            console.log('点击区域:', region);
            
            // 更新按钮样式
            document.querySelectorAll('.region-tab').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.region === region) {
                    btn.classList.add('active');
                }
            });

            // 更新当前区域
            currentSelectedRegion = region;
            currentSelectedCity = null;

            // 更新显示
            const displaySpan = document.getElementById('currentRegionDisplay');
            if (displaySpan) {
                displaySpan.textContent = region;
            }

            // 如果是直辖市或全国，直接更新图表
            if (region === '全国' || municipalities.includes(region)) {
                updateChartsForRegion(region);
            } else {
                // 如果是省份，显示城市选择
                showCitySelection(region);
                // 先显示全省数据
                updateChartsForRegion(region);
            }
        }

        // 显示城市选择
        function showCitySelection(province) {
            const citySelectionArea = document.getElementById('citySelectionArea');
            const selectedProvinceName = document.getElementById('selectedProvinceName');
            const cityTabs = document.getElementById('cityTabs');
            
            if (!citySelectionArea || !selectedProvinceName || !cityTabs) {
                console.error('城市选择区域元素未找到');
                return;
            }

            // 更新省份名称
            selectedProvinceName.textContent = province;

            // 清空现有城市按钮
            cityTabs.innerHTML = '';

            // 添加城市按钮
            const cities = cityData[province] || [];
            cities.forEach(city => {
                const btn = document.createElement('button');
                btn.className = 'city-tab';
                btn.dataset.city = city;
                btn.textContent = city;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    handleCityClick(city);
                };
                cityTabs.appendChild(btn);
            });

            // 显示城市选择区域
            citySelectionArea.style.display = 'block';
        }

        // 处理城市点击
        function handleCityClick(city) {
            console.log('点击城市:', city);
            
            currentSelectedCity = city;

            // 更新城市按钮样式
            document.querySelectorAll('.city-tab').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.city === city) {
                    btn.classList.add('active');
                }
            });

            // 更新显示
            const displaySpan = document.getElementById('currentRegionDisplay');
            if (displaySpan) {
                displaySpan.textContent = `${currentSelectedRegion} - ${city}`;
            }

            // 更新图表（使用城市数据）
            // 注意：当前数据集中可能没有城市级数据，这里使用省份数据作为示例
            updateChartsForRegion(currentSelectedRegion);
        }

        // 根据区域更新图表
        function updateChartsForRegion(region) {
            console.log('更新图表，区域:', region);
            
            let productsToShow = [];
            let marketSharesToShow = [];

            if (region === '全国') {
                // 使用全国数据
                productsToShow = productData.products;
                marketSharesToShow = productData.market_shares.products;
            } else if (window.regionDetailedData && window.regionDetailedData.regions[region]) {
                // 使用区域数据
                const regionData = window.regionDetailedData.regions[region];
                const totalSales = regionData.total_sales;
                
                // 转换区域产品数据
                productsToShow = regionData.products.map((product, index) => {
                    const sales = product.market_share.map((share, i) => {
                        return totalSales[i] * share / 100;
                    });
                    
                    const yoyChanges = sales.map((sale, i) => {
                        if (i >= 4 && sales[i-4] > 0) {
                            return ((sale - sales[i-4]) / sales[i-4]) * 100;
                        }
                        return 0;
                    });
                    
                    return {
                        id: index,
                        name: product.name,
                        sales: sales,
                        yoy_changes: yoyChanges
                    };
                });
                
                marketSharesToShow = regionData.products.map(product => ({
                    name: product.name,
                    shares: product.market_share
                }));
            } else {
                // 区域未找到，使用全国数据
                console.warn('区域未找到，使用全国数据:', region);
                productsToShow = productData.products;
                marketSharesToShow = productData.market_shares.products;
            }

            // 颜色方案
            const colors = [
                '#4361ee', '#3a0ca3', '#f72585', '#4cc9f0', '#7209b7',
                '#f8961e', '#4ade80', '#f59e0b', '#10b981', '#8b5cf6',
                '#ec4899', '#06b6d4'
            ];

            // 更新销售额图表
            if (salesChart) {
                salesChart.data.datasets = productsToShow.map((product, idx) => ({
                    label: product.name,
                    data: product.sales,
                    backgroundColor: colors[idx % colors.length] + '80',
                    borderColor: colors[idx % colors.length],
                    borderWidth: 1,
                    borderRadius: 3
                }));
                salesChart.data.labels = productData.quarters;
                salesChart.update();
            }

            // 更新同比变化图表
            if (yoyChart) {
                yoyChart.data.datasets = productsToShow.map((product, idx) => ({
                    label: product.name,
                    data: product.yoy_changes,
                    borderColor: colors[idx % colors.length],
                    backgroundColor: colors[idx % colors.length] + '20',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 3
                }));
                yoyChart.data.labels = productData.quarters;
                yoyChart.update();
            }

            // 更新市场份额图表
            if (marketShareChart) {
                marketShareChart.data.datasets = marketSharesToShow.map((product, idx) => ({
                    label: product.name,
                    data: product.shares,
                    backgroundColor: colors[idx % colors.length],
                    borderColor: colors[idx % colors.length],
                    borderWidth: 1,
                    borderRadius: 2
                }));
                marketShareChart.data.labels = productData.quarters;
                marketShareChart.update();
            }

            // 更新数据表格
            updateDataTable(productsToShow);
        }

        // 更新数据表格
        function updateDataTable(products) {
            const table = document.getElementById('dataTable');
            if (!table) return;

            const thead = table.querySelector('thead tr');
            const tbody = table.querySelector('tbody');

            // 更新表头
            while (thead.children.length > 1) {
                thead.removeChild(thead.lastChild);
            }

            productData.quarters.forEach(q => {
                const th = document.createElement('th');
                th.textContent = q;
                th.style.textAlign = 'center';
                thead.appendChild(th);
            });

            // 更新表格内容
            tbody.innerHTML = '';
            products.forEach(product => {
                const row = document.createElement('tr');
                
                const nameCell = document.createElement('td');
                nameCell.textContent = product.name;
                nameCell.style.fontWeight = '500';
                row.appendChild(nameCell);

                product.sales.forEach(sale => {
                    const cell = document.createElement('td');
                    cell.textContent = sale.toFixed(1);
                    cell.style.textAlign = 'right';
                    row.appendChild(cell);
                });

                tbody.appendChild(row);
            });
        }

        // 初始化图表
        function initCharts() {
            console.log('初始化图表...');
            
            // 销售额图表
            const salesCtx = document.getElementById('salesChart').getContext('2d');
            salesChart = new Chart(salesCtx, {
                type: 'bar',
                data: { datasets: [], labels: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } }
                }
            });

            // 同比变化图表
            const yoyCtx = document.getElementById('yoyChart').getContext('2d');
            yoyChart = new Chart(yoyCtx, {
                type: 'line',
                data: { datasets: [], labels: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } }
                }
            });

            // 市场份额图表
            const msCtx = document.getElementById('marketShareChart').getContext('2d');
            marketShareChart = new Chart(msCtx, {
                type: 'bar',
                data: { datasets: [], labels: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } },
                    scales: {
                        x: { stacked: true },
                        y: { stacked: true, beginAtZero: true, max: 100 }
                    }
                }
            });

            console.log('图表初始化完成');
        }

        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
